<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angry Duck Customizer Pro • Phase 2</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    #three-container { width: 100%; height: 100%; background: #111; }
  </style>
</head>
<body class="bg-zinc-950 text-white font-sans">
  <header class="border-b border-red-600 bg-black py-4 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img id="header-logo" src="assets/logo.png" alt="Angry Duck" class="h-12">
        <h1 class="text-3xl font-black tracking-tighter">ANGRY DUCK</h1>
      </div>
      <button onclick="toggleCart()" class="flex items-center gap-2 hover:text-red-500 transition-colors">
        <i class="fa-solid fa-cart-shopping text-2xl"></i>
        <span id="cart-count" class="bg-red-600 text-white text-xs rounded-full px-2 py-1 font-bold">0</span>
      </button>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-6 py-8 grid lg:grid-cols-12 gap-8">
    <!-- 3D Preview -->
    <div class="lg:col-span-7 flex items-center justify-center">
      <div id="three-container" class="w-[520px] h-[620px] border-4 border-red-600/30 rounded-3xl overflow-hidden shadow-2xl"></div>
    </div>

    <!-- Controls -->
    <div class="lg:col-span-5 space-y-8">
      <h2 class="text-3xl font-bold mb-2">Dein Design</h2>
      
      <input id="text-input" type="text" placeholder="Text hier eingeben..." 
             class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-5 text-2xl focus:outline-none focus:border-red-500" onkeyup="liveUpdate()">

      <select id="font-select" onchange="liveUpdate()" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-5 text-lg">
        <option value="Impact">Impact (fett)</option>
        <option value="Arial Black">Arial Black</option>
      </select>

      <button onclick="loadAngryDuckDesign()" 
              class="w-full bg-red-600 hover:bg-red-700 py-6 rounded-3xl text-xl font-bold flex items-center justify-center gap-3">
        🐤 ANGRY DUCK LOGO + SLOGAN LADEN
      </button>

      <div>
        <label class="block text-sm mb-3 font-medium">Bild hochladen (Hund, QR, Logo...)</label>
        <input type="file" id="image-upload" accept="image/*" class="hidden" onchange="uploadImage(event)">
        <button onclick="document.getElementById('image-upload').click()" 
                class="w-full border-2 border-dashed border-zinc-400 hover:border-red-500 py-12 rounded-3xl text-zinc-400 hover:text-white transition-colors">
          <i class="fa-solid fa-cloud-upload text-5xl mb-4"></i><br>
          Klick oder Datei reinziehen
        </button>
      </div>

      <div class="flex gap-4">
        <button onclick="changeColor('#111111')" class="flex-1 py-5 bg-black rounded-2xl text-lg font-semibold">SCHWARZ</button>
        <button onclick="changeColor('#ffffff')" class="flex-1 py-5 bg-white text-black rounded-2xl text-lg font-semibold">WEISS</button>
      </div>

      <button onclick="addToCart()" 
              class="w-full bg-white text-black py-7 rounded-3xl text-3xl font-black hover:scale-[1.03] transition-transform">
        IN DEN WARENKORB • €35
      </button>
    </div>
  </div>

  <script src="js/customizer.js"></script>
</body>
</html>
